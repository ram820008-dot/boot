<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Assignment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="text-center text-primary mb-4">Bootstrap Layout</h1>

    <div class="row">

        <div class="col-lg-4 col-12 p-3 border">
            <h3 class="text-center">Column 1</h3>
            <p>This is column one.</p>
        </div>

        <div class="col-lg-4 col-12 p-3 border">
            <h3 class="text-center">Column 2</h3>
            <p>This column has nested row.</p>

            <div class="row mt-3">
                <div class="col-6 p-2 border">Sub Column 1</div>
                <div class="col-6 p-2 border">Sub Column 2</div>
            </div>
        </div>

        <div class="col-lg-4 col-12 p-3 border">
            <h3 class="text-center">Column 3</h3>
            <p>This is column three.</p>
        </div>

    </div>

</div>

</body>
</html>
